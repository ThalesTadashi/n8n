services:
  postgres:
    image: ankane/pgvector
    container_name: postgres
    restart: unless-stopped
    # No Easypanel, evite expor portas para a internet se o app for interno. 
    # Caso precise acessar pelo Adminer local ou DBeaver, mantenha a linha abaixo:
    ports:
      - "5432:5432"
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data

  evolution-api:
    image: evoapicloud/evolution-api:v2.3.7
    container_name: lab_evolution_api
    restart: always
    ports:
      - "8080:8080"
    volumes:
      - lab_evolution_instances:/lab_evolution/instances
    env_file: .env

  redis:
    image: bitnami/redis:latest
    restart: always
    env_file: .env
    ports:
      - "6379:6379"
    volumes:
      - 'redis_data:/bitnami/redis/data'

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: redis_commander
    restart: always
    environment:
      - REDIS_HOSTS=local:redis:6379:0:password
    ports:
      - "8082:8181"
    depends_on:
      - redis

  adminer:
    image: adminer
    container_name: adminer
    restart: always
    ports:
      - "8081:8080"
    depends_on:
      - postgres

  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: n8n
    restart: always
    ports:
      - "5678:5678"
    env_file: .env
    environment:
      - N8N_LISTENING_PORT=5678
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  n8n_data:       
  postgres_data:
  lab_evolution_instances:
  redis_data:
    driver: local